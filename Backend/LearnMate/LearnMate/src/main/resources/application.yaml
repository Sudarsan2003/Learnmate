spring:
  application:
    name: LearnMate

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-32chars}
  expiration-ms: 86400000

learnmate:
  llm:
    provider: anthropic
    anthropic:
      model: claude-sonnet-5
      temperature: 0.3

anthropic:
  api-key: ${ANTHROPIC_API_KEY}

logging:
  level:
    com.learnmate.learnmateai: DEBUG
    org.springframework.ai: INFO

voyage:
  api-key: ${VOYAGE_API_KEY}